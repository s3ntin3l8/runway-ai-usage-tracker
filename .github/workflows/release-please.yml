name: Release Please

on:
  push:
    branches:
      - main

jobs:
  release-please:
    permissions:
      contents: write
      pull-requests: write
    uses: s3ntin3l8/.github/.github/workflows/release-please.yml@main

  build-docker:
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    permissions:
      contents: read
      packages: write
      id-token: write
    uses: s3ntin3l8/.github/.github/workflows/docker-publish.yml@main
    with:
      image-name: 's3ntin3l8/runway'
      push-release: true
      release-tag: ${{ needs.release-please.outputs.tag_name }}
    secrets: inherit

  build-sidecar:
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    strategy:
      matrix:
        include:
          - os: macos-latest
            spec: sidecar_app/spec/macos.spec
            platform: macOS
            dist_path: "dist/Runway Sidecar.app"
            ext: zip
          - os: windows-latest
            spec: sidecar_app/spec/windows.spec
            platform: Windows
            dist_path: dist/RunwaySidecar.exe
            ext: zip
          - os: ubuntu-latest
            spec: sidecar_app/spec/linux.spec
            platform: Linux
            dist_path: dist/RunwaySidecar
            ext: tar.gz
          - os: ubuntu-latest
            spec: sidecar_app/spec/linux-cli.spec
            platform: Linux-CLI
            dist_path: dist/runway-sidecar-cli
            ext: tar.gz
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    permissions:
      contents: write
    env:
      ARTIFACT: Runway-Sidecar-${{ matrix.platform }}-${{ needs.release-please.outputs.tag_name }}.${{ matrix.ext }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.release-please.outputs.tag_name }}

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -e . pystray Pillow pyinstaller packaging

      - name: Build with PyInstaller
        run: pyinstaller ${{ matrix.spec }}

      - name: Zip artifact (macOS)
        if: runner.os == 'macOS'
        run: zip -r "${{ env.ARTIFACT }}" "${{ matrix.dist_path }}"

      - name: Zip artifact (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: Compress-Archive -Path "${{ matrix.dist_path }}" -DestinationPath "${{ env.ARTIFACT }}"

      - name: Tar artifact (Linux)
        if: runner.os == 'Linux'
        run: tar -czf "${{ env.ARTIFACT }}" -C dist "$(basename '${{ matrix.dist_path }}')"

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ needs.release-please.outputs.tag_name }}
          files: ${{ env.ARTIFACT }}
