name: Release Please

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - uses: googleapis/release-please-action@v5
        id: release
        with:
          # Manifest mode so we can declare extra-files (pyproject.toml) that
          # need to be bumped in lockstep with package.json on each release.
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  build-docker:
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      packages: write
      id-token: write
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.release-please.outputs.tag_name }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Install cosign
        uses: sigstore/cosign-installer@v3.5.0

      - name: Log in to the Container registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}},value=${{ needs.release-please.outputs.tag_name }}
            type=semver,pattern={{major}}.{{minor}},value=${{ needs.release-please.outputs.tag_name }}
            type=raw,value=latest,enable=true

      - name: Build and push Docker image
        id: build-and-push
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Sign the published Docker image
        env:
          TAGS: ${{ steps.meta.outputs.tags }}
          DIGEST: ${{ steps.build-and-push.outputs.digest }}
        run: echo "${TAGS}" | xargs -I {} cosign sign --yes {}@${DIGEST}

  build-sidecar:
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    strategy:
      matrix:
        include:
          - os: macos-latest
            spec: sidecar_app/spec/macos.spec
            platform: macOS
            dist_path: "dist/Runway Sidecar.app"
            ext: zip
          - os: windows-latest
            spec: sidecar_app/spec/windows.spec
            platform: Windows
            dist_path: dist/RunwaySidecar.exe
            ext: zip
          - os: ubuntu-latest
            spec: sidecar_app/spec/linux.spec
            platform: Linux
            dist_path: dist/RunwaySidecar
            ext: tar.gz
          - os: ubuntu-latest
            spec: sidecar_app/spec/linux-cli.spec
            platform: Linux-CLI
            dist_path: dist/runway-sidecar-cli
            ext: tar.gz
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    permissions:
      contents: write
    env:
      ARTIFACT: Runway-Sidecar-${{ matrix.platform }}-${{ needs.release-please.outputs.tag_name }}.${{ matrix.ext }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.release-please.outputs.tag_name }}

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -e . pystray Pillow pyinstaller packaging

      - name: Build with PyInstaller
        run: pyinstaller ${{ matrix.spec }}

      - name: Zip artifact (macOS)
        if: runner.os == 'macOS'
        run: zip -r "${{ env.ARTIFACT }}" "${{ matrix.dist_path }}"

      - name: Zip artifact (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: Compress-Archive -Path "${{ matrix.dist_path }}" -DestinationPath "${{ env.ARTIFACT }}"

      - name: Tar artifact (Linux)
        if: runner.os == 'Linux'
        run: tar -czf "${{ env.ARTIFACT }}" -C dist "$(basename '${{ matrix.dist_path }}')"

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ needs.release-please.outputs.tag_name }}
          files: ${{ env.ARTIFACT }}
