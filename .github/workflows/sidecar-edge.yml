name: Sidecar Edge Build

# Rolling per-commit sidecar build — the sidecar analog of the Docker :edge tag.
# Publishes Linux, macOS and Windows binaries to a single, always-overwritten
# `edge` GitHub *prerelease* so the download URLs stay constant. Because it is a
# prerelease, GitHub's /releases/latest never returns it, so the stable
# update-notify channel is untouched.
on:
  push:
    branches: [main]
    paths:
      - 'scripts/sidecar.py'
      - 'scripts/sidecar_pkg/**'
      - 'sidecar_app/**'
      - 'package.json'
  workflow_dispatch:

concurrency:
  # Rolling release — only the newest main push needs to win.
  group: sidecar-edge
  cancel-in-progress: true

jobs:
  build:
    strategy:
      # Don't let a flaky macOS/Windows runner cancel the Linux legs — the
      # publish job below tolerates a partial set.
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            name: Linux
            spec: sidecar_app/spec/linux.spec
            artifact_path: dist/RunwaySidecar
            archive: Runway-Sidecar-Linux-edge.tar.gz
          - os: ubuntu-latest
            name: Linux-CLI
            spec: sidecar_app/spec/linux-cli.spec
            artifact_path: dist/runway-sidecar-cli
            archive: Runway-Sidecar-Linux-CLI-edge.tar.gz
          - os: macos-latest
            name: macOS
            spec: sidecar_app/spec/macos.spec
            artifact_path: dist/Runway Sidecar.app
            archive: Runway-Sidecar-macOS-edge.zip
          - os: windows-latest
            name: Windows
            spec: sidecar_app/spec/windows.spec
            artifact_path: dist/RunwaySidecar.exe
            archive: Runway-Sidecar-Windows-edge.zip
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -e . pystray Pillow pyinstaller packaging certifi

      - name: Stamp edge version
        # Mark the bundled package.json so the binary reports `<base>+edge.<sha>`.
        # Working-copy only — never committed. bash + jq ship on all GH runners.
        shell: bash
        run: |
          SHORT_SHA=$(git rev-parse --short HEAD)
          BASE=$(jq -r .version package.json)
          jq --arg v "${BASE}+edge.${SHORT_SHA}" '.version=$v' package.json > pkg.tmp
          mv pkg.tmp package.json
          echo "Stamped version: ${BASE}+edge.${SHORT_SHA}"

      - name: Generate icons
        run: python sidecar_app/assets/generate_icons.py

      - name: Build with PyInstaller
        run: pyinstaller ${{ matrix.spec }}

      - name: Package (macOS)
        if: runner.os == 'macOS'
        run: cd dist && zip -r "../${{ matrix.archive }}" "Runway Sidecar.app"

      - name: Package (Windows)
        if: runner.os == 'Windows'
        run: Compress-Archive -Path "${{ matrix.artifact_path }}" -DestinationPath "${{ matrix.archive }}"

      - name: Package (Linux)
        if: runner.os == 'Linux'
        run: tar -czf "${{ matrix.archive }}" -C dist "$(basename '${{ matrix.artifact_path }}')"

      - name: Checksum
        # Python (already installed) keeps this identical across all three OSes;
        # output is sha256sum-compatible (`<hex>  <name>`).
        shell: bash
        run: |
          python -c "import hashlib,pathlib,sys; p=pathlib.Path(sys.argv[1]); print(hashlib.sha256(p.read_bytes()).hexdigest()+'  '+p.name)" "${{ matrix.archive }}" > "${{ matrix.archive }}.sha256"

      - name: Upload build artifact
        uses: actions/upload-artifact@v7
        with:
          name: edge-${{ matrix.name }}
          path: |
            ${{ matrix.archive }}
            ${{ matrix.archive }}.sha256
          retention-days: 1

  publish:
    needs: build
    # Publish whatever built — a single failed platform leg shouldn't hold back
    # the rest of the rolling edge channel.
    if: ${{ !cancelled() }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - name: Download build artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: edge-*
          path: edge-dist
          merge-multiple: true

      - name: Move rolling edge tag
        # softprops/action-gh-release does not move an existing tag; force it to
        # this commit so the auto-attached source archive matches the binaries.
        run: |
          git tag -f edge
          git push -f origin edge

      - name: Publish to rolling edge prerelease
        uses: softprops/action-gh-release@v3
        with:
          tag_name: edge
          prerelease: true
          name: "Edge (rolling)"
          body: "Rolling sidecar build from ${{ github.sha }}. Not a stable release."
          files: edge-dist/*
