name: CI/CD

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-python:
    uses: s3ntin3l8/.github/.github/workflows/ci-python.yml@harden/env-route-inputs
    with:
      python-version: '3.12'
      coverage-fail-under: '70'
    secrets: inherit

  test-frontend:
    uses: s3ntin3l8/.github/.github/workflows/ci-node.yml@feat/ci-node-coverage
    with:
      node-version: '22'
      build-script: 'build:css'

  build-docker:
    needs: [test-python, test-frontend]
    permissions:
      contents: read
      packages: write
      id-token: write
    uses: s3ntin3l8/.github/.github/workflows/docker-publish.yml@main
    with:
      image-name: 's3ntin3l8/runway'
      push-edge: ${{ github.event_name == 'push' }}
    secrets: inherit
