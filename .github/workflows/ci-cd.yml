name: CI/CD

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-python:
    uses: s3ntin3l8/.github/.github/workflows/ci-python.yml@main
    with:
      python-version: '3.12'
      coverage-fail-under: '70'
    secrets: inherit

  test-frontend:
    uses: s3ntin3l8/.github/.github/workflows/ci-node.yml@main
    with:
      node-version: '22'
      working-directory: 'webapp'
      cache-dependency-path: 'webapp/package-lock.json'
      build-script: 'build'
      # 'test:coverage' emits coverage/coverage-summary.json (vitest v8), which
      # turns on the reusable workflow's Codecov upload for the frontend.
      test-script: 'test:coverage'
      # Gate on total line coverage (currently ~93%); buffer for variance.
      coverage-fail-under: '85'
      strict-checks: true
    secrets: inherit

  build-docker:
    needs: [test-python, test-frontend]
    permissions:
      contents: read
      packages: write
      id-token: write
    uses: s3ntin3l8/.github/.github/workflows/docker-publish.yml@main
    with:
      image-name: 's3ntin3l8/runway'
      push-edge: ${{ github.event_name == 'push' }}
    secrets: inherit
