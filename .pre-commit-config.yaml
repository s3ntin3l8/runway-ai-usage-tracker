# Pre-commit hooks configuration
# Install with: make install-hooks (or pre-commit install && pre-commit install --hook-type pre-push)
# Run manually: pre-commit run --all-files

repos:
  # Detect secrets
  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.5.0
    hooks:
      - id: detect-secrets
        args: ['--baseline', '.secrets.baseline']
        exclude: |
          (?x)^(
              \.env\.example|
              scripts/test_.*\.py|
              docs/.*
          )$

  # Basic pre-commit checks
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
        # Compose override files use spec tags (!reset/!override) the generic
        # YAML parser can't construct; `docker compose config` validates them.
        exclude: ^docker-compose\.override.*\.ya?ml$
      - id: check-added-large-files
        args: ['--maxkb=1000']
      - id: check-json
      - id: check-merge-conflict

  # Python linting and formatting with Ruff
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.11
    hooks:
      - id: ruff
        args: [ --fix ]
      - id: ruff-format

  - repo: local
    hooks:
      - id: mypy
        name: mypy
        entry: .venv/bin/mypy . --ignore-missing-imports
        language: system
        types: [python]
        pass_filenames: false

  # Local hooks for tests
  - repo: local
    hooks:
      - id: pytest-unit
        name: pytest (unit tests)
        entry: .venv/bin/pytest tests/unit/ --ignore=tests/unit/test_browser_cookies.py -q
        language: system
        types: [python]
        pass_filenames: false
        stages: [pre-commit]

      - id: pytest-all
        name: pytest (all tests)
        entry: .venv/bin/pytest --ignore=tests/unit/test_browser_cookies.py -q
        language: system
        types: [python]
        pass_filenames: false
        stages: [pre-push]
