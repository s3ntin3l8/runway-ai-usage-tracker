coverage:
  status:
    project:
      default:
        # 'auto' compares against the PR base rather than a fixed number, so the
        # combined backend+frontend baseline doesn't sit permanently red now that
        # vitest coverage is uploaded too. Threshold = max tolerated drop vs base.
        target: auto
        threshold: 2%
    patch:
      default:
        target: 70%       # new/changed lines in a PR should be well-covered

comment:
  layout: "reach,diff,flags"
  behavior: default       # post once, update on new commits
  require_changes: true   # only comment if coverage changed
