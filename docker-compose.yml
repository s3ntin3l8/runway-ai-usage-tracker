#  ╔─────────────────────────────────────────────────────────────────────────────╗
#  ║  🏃 Runway — AI Usage Tracker                                               ║
#  ║  📦 Docker Compose Configuration                                            ║
#  ╚─────────────────────────────────────────────────────────────────────────────╝
#
#  Quick Start:
#    1. Copy .env.example to .env and configure your API keys
#    2. docker-compose up -d
#    3. Access dashboard at http://localhost:8765
#
#  ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

version: '3.8'

services:
  runway:
    build:
      context: .
      dockerfile: Dockerfile
    image: runway:latest
    container_name: runway
    ports:
      - "8765:8765"
    env_file:
      - .env
    volumes:
      # Persist external metrics between restarts
      - ./data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8765/api/v1/system/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

volumes:
  data:
    driver: local
