    <title>Runway</title>
    <script type="module">
      // Apply the persisted theme before first paint to avoid a flash.
      // Bundled by Vite (no inline script in the final HTML would be ideal,
      // but Vite inlines module scripts < threshold as external assets — this
      // stays a separate hashed file, satisfying script-src 'self').
      const stored = localStorage.getItem('runway_theme');
      const system = matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark';
      const theme = stored === 'light' || stored === 'dark' ? stored : system;
      document.documentElement.dataset.theme = theme;
      // Match the status-bar tint to the resolved theme before first paint
      // (kept in sync at runtime by useTheme). Values mirror --canvas in tokens.css.
      document
        .querySelector('meta[name="theme-color"]')
        ?.setAttribute('content', theme === 'light' ? '#fafafa' : '#0a0a0b');
    </script>
