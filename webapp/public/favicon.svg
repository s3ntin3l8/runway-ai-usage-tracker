<svg width="1024" height="1024" viewBox="0 0 1024 1024" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Premium radial gradient for the base -->
    <radialGradient id="baseGrad" cx="512" cy="512" r="430" gradientUnits="userSpaceOnUse">
      <stop offset="0.6" stop-color="#18181b"/>
      <stop offset="0.95" stop-color="#09090b"/>
      <stop offset="1" stop-color="#000000"/>
    </radialGradient>

    <!-- Vivid gradient for the capsule -->
    <linearGradient id="pillGrad" x1="512" y1="280" x2="512" y2="744" gradientUnits="userSpaceOnUse">
      <stop stop-color="#60a5fa"/>
      <stop offset="0.5" stop-color="#8b5cf6"/>
      <stop offset="1" stop-color="#d946ef"/>
    </linearGradient>

    <!-- Glass gloss effect -->
    <linearGradient id="glassGloss" x1="480" y1="300" x2="544" y2="700" gradientUnits="userSpaceOnUse">
      <stop stop-color="white" stop-opacity="0.4"/>
      <stop offset="0.5" stop-color="white" stop-opacity="0.05"/>
      <stop offset="1" stop-color="white" stop-opacity="0.2"/>
    </linearGradient>

    <!-- Glow filters -->
    <filter id="outerGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="30" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>

    <filter id="innerGlow">
      <feGaussianBlur stdDeviation="15" result="blur"/>
    </filter>
  </defs>

  <!-- Circular background base -->
  <circle cx="512" cy="512" r="430" fill="url(#baseGrad)"/>
  <circle cx="512" cy="512" r="428" stroke="#3f3f46" stroke-width="4" stroke-opacity="0.5"/>

  <!-- Glowing capsule (Pill) -->
  <g filter="url(#outerGlow)">
    <rect x="424" y="280" width="176" height="464" rx="88" fill="url(#pillGrad)"/>
    <!-- Glass shine/reflection -->
    <rect x="424" y="280" width="176" height="464" rx="88" fill="url(#glassGloss)" opacity="0.6"/>
    <!-- Inner bright spot -->
    <rect x="450" y="320" width="40" height="120" rx="20" fill="white" fill-opacity="0.3"/>
  </g>
</svg>
