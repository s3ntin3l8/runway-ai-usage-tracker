<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>Runway — AI Subscription Limits</title>
    <meta name="description" content="Live dashboard tracking remaining AI subscription limits and reset timers across all your developer tools.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500&display=swap">
    <link rel="stylesheet" href="/static/css/styles.css?v=3">
    <link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
</head>
<body class="min-h-screen">

    <!-- Background gradient -->
    <div class="fixed inset-0 pointer-events-none" style="background: radial-gradient(ellipse 80% 60% at 50% -20%, rgba(59,130,246,0.06) 0%, transparent 70%), radial-gradient(ellipse 50% 40% at 80% 80%, rgba(139,92,246,0.04) 0%, transparent 60%);"></div>

    <div class="relative max-w-7xl mx-auto px-6 py-10 md:px-12 md:py-14">

        <!-- Header -->
        <header class="mb-12 flex flex-col sm:flex-row sm:items-end justify-between gap-6 border-b border-zinc-800/50 pb-8">
            <div>
                <div class="flex items-center gap-3 mb-4">
                    <div class="w-2 h-8 rounded-full bg-gradient-to-b from-blue-400 to-violet-500"></div>
                    <h1 class="text-3xl font-black tracking-tight text-zinc-50">Runway</h1>
                </div>
                
                <nav id="main-nav" class="flex items-center gap-6 ml-5">
                    <button class="nav-link" id="nav-dashboard">Dashboard</button>
                    <button class="nav-link" id="nav-history">History</button>
                    <button class="nav-link" id="nav-fleet">Fleet</button>
                    <button class="nav-link" id="nav-settings">Settings</button>
                </nav>
            </div>

            <div class="flex flex-col items-end gap-3 ml-5 sm:ml-0">
                <div class="flex items-center gap-1" id="header-controls">
                    <button id="toggle-edit" class="icon-btn" title="Edit layout" aria-pressed="false">
                        <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M17 3a2.85 2.83 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5Z"/>
                            <path d="m15 5 4 4"/>
                        </svg>
                    </button>
                    <button id="toggle-theme" class="icon-btn" title="Toggle bright/dark">
                        <svg id="theme-icon-sun" xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <circle cx="12" cy="12" r="4"/>
                            <path d="M12 2v2"/><path d="M12 20v2"/><path d="m4.93 4.93 1.41 1.41"/><path d="m17.66 17.66 1.41 1.41"/><path d="M2 12h2"/><path d="M20 12h2"/><path d="m6.34 17.66-1.41 1.41"/><path d="m19.07 4.93-1.41 1.41"/>
                        </svg>
                        <svg id="theme-icon-moon" class="hidden" xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"/>
                        </svg>
                    </button>
                    <button id="refresh-btn" class="icon-btn" title="Force sync all providers">
                        <svg id="refresh-icon" xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M21 12a9 9 0 0 0-9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/>
                            <path d="M3 3v5h5"/>
                            <path d="M3 12a9 9 0 0 0 9 9 9.75 9.75 0 0 0 6.74-2.74L21 16"/>
                            <path d="M16 16h5v5"/>
                        </svg>
                    </button>
                    <span id="last-updated" class="text-[10px] text-zinc-600 mono ml-2 hidden"></span>
                </div>
            </div>
        </header>

        <!-- View Containers -->
        <main id="view-container">
            <!-- Dashboard View -->
            <section id="view-dashboard" class="view hidden">
                <div id="health-bar"></div>
                <!-- Loading skeletons -->
                <div id="loading" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-5 hidden">
                    <div class="skeleton h-48 glass-panel rounded-2xl"></div>
                    <div class="skeleton h-48 glass-panel rounded-2xl"></div>
                    <div class="skeleton h-48 glass-panel rounded-2xl"></div>
                    <div class="skeleton h-48 glass-panel rounded-2xl"></div>
                </div>

                <!-- Error banner -->
                <div id="error-banner" class="hidden p-4 bg-red-950/40 border border-red-800/50 text-red-400 rounded-xl mono text-sm mb-6">
                    > Connection refused.
                </div>

                <!-- Context filter bar -->
                <div id="filter-bar" class="mb-5 flex flex-col gap-2">
                    <div class="flex gap-2 items-center">
                        <span class="text-[10px] text-zinc-600 uppercase tracking-wide">Filter by</span>
                        <button class="dim-btn" data-dim="window_type" onclick="setFilterDimension('window_type')">Window</button>
                        <button class="dim-btn" data-dim="account_label" onclick="setFilterDimension('account_label')">Account</button>
                        <button id="dim-btn-sidecar" class="dim-btn hidden" data-dim="sidecar_id" onclick="setFilterDimension('sidecar_id')">Source</button>
                    </div>
                    <div id="filter-pills" class="flex flex-wrap gap-1.5"></div>
                </div>

                <!-- Grid (provider-grouped, no fixed grid classes — JS handles layout per section) -->
                <div id="grid"></div>
            </section>

            <!-- History View -->
            <section id="view-history" class="view hidden">
                <!-- Chart Panel -->
                <div id="history-chart-panel" class="glass-panel rounded-3xl p-6 mb-6">
                    <div class="flex flex-wrap items-center justify-between gap-3 mb-4">
                        <h3 class="text-sm font-semibold text-zinc-400 uppercase tracking-wide">Usage Over Time</h3>
                        <div class="flex items-center gap-3 flex-wrap">
                            <!-- Time range -->
                            <div class="flex gap-1" id="history-range-btns">
                                <button class="toggle-btn" data-days="0.042" onclick="setHistoryDays(0.042)">1h</button>
                                <button class="toggle-btn" data-days="0.25" onclick="setHistoryDays(0.25)">6h</button>
                                <button class="toggle-btn" data-days="1" onclick="setHistoryDays(1)">1d</button>
                                <button class="toggle-btn active" data-days="7" onclick="setHistoryDays(7)">7d</button>
                                <button class="toggle-btn" data-days="30" onclick="setHistoryDays(30)">30d</button>
                                <button class="toggle-btn" data-days="90" onclick="setHistoryDays(90)">90d</button>
                            </div>
                            <!-- Metric -->
                            <div class="flex gap-1" id="history-metric-btns">
                                <button class="toggle-btn active" data-metric="percent" onclick="setHistoryMetric('percent')">% used</button>
                                <button class="toggle-btn" data-metric="tokens" onclick="setHistoryMetric('tokens')">tokens</button>
                                <button class="toggle-btn" data-metric="cost" onclick="setHistoryMetric('cost')">cost</button>
                            </div>
                        </div>
                    </div>
                    <div id="history-sparkline-strip"></div>
                    <div id="chart-empty" class="hidden text-zinc-500 italic text-sm py-8 text-center">No data for selected range.</div>
                    <div id="chart-wrap"><canvas id="chart-usage" height="400"></canvas></div>
                </div>

                <!-- Header + CSV download -->
                <div class="flex justify-between items-center mb-4">
                    <h2 class="text-xl font-bold text-zinc-100 flex items-center gap-2">
                        <span class="text-blue-400">🕒</span> Usage History
                    </h2>
                    <a id="csv-download-btn"
                       href="/api/v1/usage/history?format=csv"
                       download
                       class="toggle-btn text-sm">
                        Download CSV
                    </a>
                </div>

                <div class="glass-panel rounded-3xl p-8">
                    <div id="history-content" class="overflow-x-auto">
                        <p class="text-zinc-500 italic">No history data found.</p>
                    </div>
                </div>
            </section>

            <!-- Fleet View -->
            <section id="view-fleet" class="view hidden">
                <div class="mb-6">
                    <h2 class="text-xl font-bold text-zinc-100 flex items-center gap-2">
                        <span class="text-violet-400">🖥️</span> Sidecar Fleet
                    </h2>
                    <p class="text-xs text-zinc-600 mt-1">Sidecars that have sent at least one ingest payload to this server.</p>
                </div>
                <div id="fleet-content">
                    <!-- Fleet cards will be injected here -->
                </div>
            </section>

            <!-- Settings View -->
            <section id="view-settings" class="view hidden">
                <div class="flex gap-0 min-h-[560px]">
                    <!-- Sidebar nav -->
                    <nav id="settings-nav" class="w-36 shrink-0 flex flex-col gap-1 pt-2 pr-5">
                        <button class="settings-nav-item" data-section="providers">🔌 Providers</button>
                        <button class="settings-nav-item" data-section="tokens">🔑 Tokens</button>
                        <button class="settings-nav-item" data-section="webhooks">🔔 Webhooks</button>
                        <button class="settings-nav-item" data-section="system">⚙️ System</button>
                    </nav>
                    <!-- Content pane -->
                    <div id="settings-pane" class="flex-1 glass-panel rounded-3xl p-8 min-h-[400px]">
                        <!-- Injected by JS -->
                    </div>
                </div>
            </section>
        </main>

        <!-- Footer -->
        <footer class="mt-14 text-center text-xs text-zinc-700 mono">
            runway · local-first · <span id="footer-count">0</span> sources ·
            <a href="https://github.com/s3ntin3l8/ai-usage-tracker" target="_blank" rel="noopener noreferrer" class="hover:text-zinc-500 transition-colors">GitHub</a>
        </footer>
    </div>

    <!-- Modal Backdrop & Content -->
    <div id="modal-container" class="fixed inset-0 z-50 flex items-center justify-center p-4 sm:p-6 opacity-0 pointer-events-none" style="transition: opacity 0.15s ease;">
        <div id="modal-backdrop" class="absolute inset-0 bg-black/75"></div>
        <div id="modal-content" class="relative w-full max-w-4xl modal-panel rounded-3xl p-6 md:p-8 shadow-2xl transform scale-95 opacity-0 overflow-hidden max-h-[90vh] overflow-y-auto" style="transition: opacity 0.15s ease, transform 0.15s ease;">
            <!-- Content will be injected here -->
        </div>
    </div>

    <!-- Application script -->
    <script type="module" src="/static/js/app.js?v=3" defer></script>
</body>
</html>
