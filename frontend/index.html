<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>Runway — AI Subscription Limits</title>
    <meta name="description" content="Live dashboard tracking remaining AI subscription limits and reset timers across all your developer tools.">
    <script src="https://cdn.tailwindcss.com?nocache=1"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/styles.css?v=2">
</head>
<body class="min-h-screen">

    <!-- Background gradient -->
    <div class="fixed inset-0 pointer-events-none" style="background: radial-gradient(ellipse 80% 60% at 50% -20%, rgba(59,130,246,0.06) 0%, transparent 70%), radial-gradient(ellipse 50% 40% at 80% 80%, rgba(139,92,246,0.04) 0%, transparent 60%);"></div>

    <div class="relative max-w-7xl mx-auto px-6 py-10 md:px-12 md:py-14">

        <!-- Header -->
        <header class="mb-12 flex flex-col sm:flex-row sm:items-end justify-between gap-6">
            <div>
                <div class="flex items-center gap-3 mb-2">
                    <div class="w-2 h-8 rounded-full bg-gradient-to-b from-blue-400 to-violet-500"></div>
                    <h1 class="text-3xl font-black tracking-tight text-zinc-50">Runway</h1>
                </div>
                <p class="text-zinc-500 text-sm uppercase tracking-widest font-medium ml-5">Live AI Subscription Limits</p>
            </div>

            <div class="flex flex-col items-end gap-3 ml-5 sm:ml-0">
                <div class="flex items-center gap-2">
                    <button id="toggle-compact" class="toggle-btn" onclick="toggleConfig('compact')">COMPACT</button>
                    <button id="toggle-remaining" class="toggle-btn" onclick="toggleConfig('remaining')">📊 % Used</button>
                    <span id="last-updated" class="text-[10px] text-zinc-600 mono ml-2 hidden"></span>
                </div>
                <button id="refresh-btn" class="flex items-center gap-2 bg-zinc-800 hover:bg-zinc-700 border border-zinc-700 hover:border-zinc-500 text-zinc-200 px-5 py-2.5 rounded-lg text-sm font-semibold transition-all duration-200 shadow-sm active:scale-95">
                    <svg id="refresh-icon" xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12a9 9 0 0 0-9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/><path d="M3 12a9 9 0 0 0 9 9 9.75 9.75 0 0 0 6.74-2.74L21 16"/><path d="M16 16h5v5"/></svg>
                    Sync Limits
                </button>
            </div>
        </header>

        <!-- Loading skeletons -->
        <div id="loading" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-5 hidden">
            <div class="skeleton h-48 glass-panel rounded-2xl"></div>
            <div class="skeleton h-48 glass-panel rounded-2xl"></div>
            <div class="skeleton h-48 glass-panel rounded-2xl"></div>
            <div class="skeleton h-48 glass-panel rounded-2xl"></div>
            <div class="skeleton h-48 glass-panel rounded-2xl"></div>
            <div class="skeleton h-48 glass-panel rounded-2xl"></div>
            <div class="skeleton h-48 glass-panel rounded-2xl"></div>
            <div class="skeleton h-48 glass-panel rounded-2xl"></div>
        </div>

        <!-- Error banner -->
        <div id="error-banner" class="hidden p-4 bg-red-950/40 border border-red-800/50 text-red-400 rounded-xl mono text-sm mb-6">
            > Connection refused. Make sure <strong class="text-red-300">uvicorn app.main:app</strong> is running.
        </div>

        <!-- Grid -->
        <div id="grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-5"></div>

        <!-- Footer -->
        <footer class="mt-14 text-center text-xs text-zinc-700 mono">
            runway · local-first · stateless · <span id="footer-count">0</span> sources
        </footer>
    </div>

    <!-- Application script -->
    <script type="module" src="/static/js/app.js?v=2"></script>
</body>
</html>
